<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickShop Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>QuickShop</h1>
      <button id="open-admin" class="btn btn-primary">+ Add Product</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>Categories</h2>
        <div id="category-filters" class="filters"></div>
      </aside>

      <section class="content">
        <div class="content-head">
          <h2>Products</h2>
          <input id="search" type="search" placeholder="Search products..." />
        </div>
        <div id="products" class="products-grid"></div>
      </section>
    </main>

    <dialog id="admin-dialog">
      <form id="product-form" method="dialog">
        <h3>Add Product</h3>
        <label>
          Product name
          <input name="name" required />
        </label>
        <label>
          Price (USD)
          <input name="price" type="number" min="0" step="0.01" required />
        </label>
        <label>
          Category
          <select name="category" required>
            <option value="Men">Men</option>
            <option value="Women">Women</option>
            <option value="Children">Children</option>
          </select>
        </label>
        <label>
          Image URL (optional)
          <input name="image" type="url" placeholder="https://..." />
        </label>
        <menu>
          <button value="cancel" class="btn">Cancel</button>
          <button value="submit" class="btn btn-primary">Save product</button>
        </menu>
      </form>
    </dialog>

    <template id="product-card-template">
      <article class="product-card">
        <img alt="" />
        <div>
          <h3></h3>
          <p class="category"></p>
          <p class="price"></p>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
